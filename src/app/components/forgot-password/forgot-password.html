<main class="main-content">
  <div class="login-container">

    <!-- Left Side -->
    <div class="login-image">
      <div class="image-content">
        <h2>Quên mật khẩu</h2>
        <p>
          Nhập email của bạn và chúng tôi sẽ gửi hướng dẫn để đặt lại mật khẩu.
        </p>
      </div>
    </div>

    <!-- Right Side -->
    <div class="login-form-container">

      <div class="form-header">
        <h2>Quên mật khẩu</h2>
        <p>Nhập email của bạn để nhận link đặt lại mật khẩu</p>
      </div>

      <form class="login-form" (ngSubmit)="send()">

        <!-- EMAIL -->
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <input 
              type="email" 
              name="email" 
              [(ngModel)]="email" 
              placeholder="Nhập địa chỉ email" 
              required
            >
          </div>
        </div>

        <!-- BUTTON -->
        <button type="submit" class="btn-login">
          <span class="btn-text">Gửi yêu cầu</span>
        </button>

        <!-- MESSAGE -->
        <p class="message success" *ngIf="message">{{ message }}</p>
        <p class="message error" *ngIf="error">{{ error }}</p>

        <!-- Back to Login -->
        <p class="register-link">
          Nhớ mật khẩu? 
          <a routerLink="/login">Đăng nhập ngay</a>
        </p>

      </form>

    </div>

  </div>
</main>
