<section class="bg-neutral-50 py-8 md:py-12">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <h2 class="mb-5 text-xl font-semibold text-neutral-800 md:mb-10 md:text-3xl">
      Có thể bạn sẽ thích
    </h2>

    <div *ngIf="isLoading" class="flex flex-col items-center justify-center py-16">
      <div class="h-12 w-12 animate-spin rounded-full border-t-4 border-b-4 border-amber-700"></div>
      <p class="mt-4 font-medium text-neutral-600">Đang tải gợi ý sản phẩm...</p>
    </div>

    <div *ngIf="error && !isLoading" class="py-16 text-center font-medium text-red-600">
      {{ error }}
    </div>

    <div *ngIf="!isLoading && !error && recommendedProducts.length > 0" class="relative">
      <button
        (click)="prev()"
        class="absolute left-3 top-1/2 z-20 hidden h-10 w-10 -translate-y-1/2 items-center justify-center rounded-full bg-black/45 text-white shadow-lg backdrop-blur-sm transition hover:bg-black/65 md:left-4 md:flex md:h-12 md:w-12"
        aria-label="Sản phẩm trước"
      >
        <svg class="h-4 w-4 md:h-6 md:w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
      </button>

      <button
        (click)="next()"
        class="absolute right-3 top-1/2 z-20 hidden h-10 w-10 -translate-y-1/2 items-center justify-center rounded-full bg-black/45 text-white shadow-lg backdrop-blur-sm transition hover:bg-black/65 md:right-4 md:flex md:h-12 md:w-12"
        aria-label="Sản phẩm tiếp"
      >
        <svg class="h-4 w-4 md:h-6 md:w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
        </svg>
      </button>

      <div class="overflow-hidden">
        <div #carouselTrack class="flex transition-transform duration-500 ease-in-out">
          <div
            *ngFor="let product of recommendedProducts; trackBy: trackById"
            class="w-full flex-shrink-0 px-1.5 sm:w-1/2 sm:px-2 md:w-1/3 lg:w-1/4 xl:w-1/4"
          >
            <app-product-card [product]="product"></app-product-card>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="!isLoading && !error && recommendedProducts.length === 0" class="py-16 text-center font-medium text-neutral-500">
      Hiện tại chưa có sản phẩm gợi ý nào.
    </div>
  </div>
</section>
