<section class="py-16 md:py-20 bg-neutral-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <h2 class="text-2xl md:text-3xl font-bold text-neutral-800 mb-10 md:mb-12 text-center">
      Gợi ý dành cho bạn
    </h2>

    <!-- Loading -->
    <div *ngIf="isLoading" class="flex flex-col items-center justify-center py-16">
      <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-amber-700"></div>
      <p class="mt-4 text-neutral-600 font-medium">
        Đang tải gợi ý sản phẩm...
      </p>
    </div>

    <!-- Error -->
    <div *ngIf="error && !isLoading"
         class="text-center py-16 text-red-600 font-medium">
      {{ error }}
    </div>

    <!-- Carousel -->
    <div *ngIf="!isLoading && !error && recommendedProducts.length > 0"
         class="relative">

      <!-- Nút trái -->
      <button
        (click)="prev()"
        class="absolute left-0 md:left-2 top-1/2 -translate-y-1/2 bg-white/90 p-3 md:p-4 rounded-full shadow-xl hover:bg-white z-20 transition text-2xl"
        aria-label="Sản phẩm trước">
        ←
      </button>

      <!-- Nút phải -->
      <button
        (click)="next()"
        class="absolute right-0 md:right-2 top-1/2 -translate-y-1/2 bg-white/90 p-3 md:p-4 rounded-full shadow-xl hover:bg-white z-20 transition text-2xl"
        aria-label="Sản phẩm tiếp">
        →
      </button>

      <!-- Track -->
      <div class="overflow-hidden">
        <div
          #carouselTrack
          class="flex transition-transform duration-500 ease-in-out">

          <div
            *ngFor="let product of recommendedProducts; trackBy: trackById"
            class="flex-shrink-0 w-full px-3 sm:w-1/2 md:w-1/3 lg:w-1/4 xl:w-1/4">

            <app-product-card
              [product]="product">
            </app-product-card>

          </div>

        </div>
      </div>

    </div>

    <!-- No data -->
    <div *ngIf="!isLoading && !error && recommendedProducts.length === 0"
         class="text-center py-16 text-neutral-500 font-medium">
      Hiện tại chưa có sản phẩm gợi ý nào.
    </div>

  </div>
</section>
