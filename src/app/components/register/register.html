<h2>Đăng ký</h2>

<input [(ngModel)]="user.tenDangNhap" placeholder="Tên đăng nhập">
<br><br>

<input [(ngModel)]="user.email" placeholder="Email">
<br><br>

<input [(ngModel)]="user.matKhau" type="password" placeholder="Mật khẩu">
<br><br>

<input [(ngModel)]="user.hoTen" placeholder="Họ tên">
<br><br>

<input [(ngModel)]="user.soDienThoai" placeholder="Số điện thoại">
<br><br>

<button (click)="register()">Đăng ký</button>
