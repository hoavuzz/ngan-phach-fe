<section class="bg-neutral-100 py-10 md:py-12">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <h2 class="mb-6 text-2xl font-semibold text-neutral-800 md:mb-8">
      Đối tác
    </h2>

    <div class="grid gap-5 sm:grid-cols-2 lg:grid-cols-4">

      <div *ngFor="let partner of partners"
           class="bg-white border rounded-xl h-40 flex items-center justify-center hover:shadow-md transition">

        <span class="text-neutral-700 font-medium text-center px-4">
          {{ partner.name }}
        </span>

      </div>

    </div>

  </div>
</section>
