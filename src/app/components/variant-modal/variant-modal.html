<div *ngIf="isOpen" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg p-6 w-full max-w-md mx-4">
    <h2 class="text-xl font-semibold mb-4">Chọn biến thể</h2>
    <p class="mb-4 font-medium">{{ product?.name }}</p>

    <div class="mb-4">
      <label class="block text-sm font-medium mb-2">Biến thể:</label>
      <select
        [(ngModel)]="selectedVariant"
        class="w-full border border-gray-300 rounded px-3 py-2"
        [compareWith]="compareVariants">
        <option *ngFor="let variant of product?.sanpham_bienthes; let idx = index" [ngValue]="variant">
          Biến thể {{ idx + 1 }}
        </option>
      </select>
    </div>

    <div *ngIf="selectedVariant" class="mb-4 border rounded p-3 bg-gray-50">
      <p class="text-sm text-gray-600 mb-1">
        <span class="font-medium">Giá gốc:</span> 
        {{ selectedVariant.giaBan | number: '1.0-0' }} ₫
      </p>
      <p *ngIf="selectedVariant.giaKhuyenMai && selectedVariant.giaKhuyenMai !== selectedVariant.giaBan" 
         class="text-sm text-red-600 mb-1 font-medium">
        <span class="font-medium">Giá khuyến mãi:</span> 
        {{ selectedVariant.giaKhuyenMai | number: '1.0-0' }} ₫
      </p>
      <p class="text-sm text-green-600 font-medium">
        <span class="font-medium">Tồn kho:</span> {{ selectedVariant.tonKho }} sản phẩm
      </p>
    </div>

    <div class="flex justify-end space-x-2">
      <button
        (click)="onClose()"
        class="px-4 py-2 border border-gray-300 rounded text-gray-700 hover:bg-gray-100">
        Hủy
      </button>
      <button
        (click)="onSelect()"
        [disabled]="!selectedVariant || selectedVariant.tonKho <= 0"
        class="px-4 py-2 bg-amber-700 text-white rounded hover:bg-amber-800 disabled:bg-gray-400 disabled:cursor-not-allowed">
        Thêm vào giỏ
      </button>
    </div>
  </div>
</div>
