<main class="main-content">
  <div class="login-container">

    <!-- Left Side -->
    <div class="login-image">
      <div class="image-content">
        <h2>Đặt lại mật khẩu</h2>
        <p>
          Nhập mật khẩu mới của bạn để tiếp tục đăng nhập và sử dụng tài khoản.
        </p>
      </div>
    </div>

    <!-- Right Side -->
    <div class="login-form-container">

      <form class="login-form" (ngSubmit)="reset()">

        <!-- NEW PASSWORD -->
        <div class="form-group">
          <label>Mật khẩu mới</label>
          <div class="input-wrapper">
            <input
              type="password"
              name="matKhauMoi"
              [(ngModel)]="matKhauMoi"
              placeholder="Nhập mật khẩu mới"
              required
            >
          </div>
        </div>

        <!-- BUTTON -->
        <button type="submit" class="btn-login">
          <span class="btn-text">Đổi mật khẩu</span>
        </button>

        <!-- MESSAGE -->
        <p class="message success" *ngIf="message">{{ message }}</p>
        <p class="message error" *ngIf="error">{{ error }}</p>

        <!-- Back to Login -->
        <p class="register-link">
          Nhớ mật khẩu? 
          <a routerLink="/login">Đăng nhập ngay</a>
        </p>

      </form>

    </div>

  </div>
</main>
