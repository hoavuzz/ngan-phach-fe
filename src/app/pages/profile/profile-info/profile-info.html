<div class="flex-1 bg-white border border-[#E5D3B3] rounded-xl p-8 shadow-sm">
  <!-- Hiển thị loading -->
  <div *ngIf="isLoading" class="text-center py-8">
    <p>Đang tải thông tin...</p>
  </div>

  <!-- Hiển thị lỗi -->
  <div *ngIf="errorMessage" class="text-center py-8 text-red-600">
    <p>{{ errorMessage }}</p>
    <button (click)="loadProfile()" class="mt-4 bg-[#9A3F0F] text-white px-4 py-2 rounded-lg">
      Thử lại
    </button>
  </div>

  <!-- Nội dung chính -->
  <div *ngIf="!isLoading && !errorMessage">
    <!-- HEADER -->
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-2xl font-semibold">Thông tin tài khoản</h2>
      <button
        (click)="toggleEdit()"
        class="bg-[#9A3F0F] text-white px-5 py-2 rounded-lg hover:bg-[#7C2D12]">
        {{ editing ? 'Hủy' : 'Chỉnh sửa' }}
      </button>
    </div>

    <div class="flex gap-10">
      <!-- AVATAR -->
      <div class="flex flex-col items-center">
        <img
          [src]="avatarPreview"
          class="w-36 h-36 rounded-full object-cover border">
        <input
          type="file"
          hidden
          #avatarInput
          (change)="onAvatarChange($event)"
          accept="image/*">
        <button
          (click)="avatarInput.click()"
          class="mt-4 px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 text-sm">
          Đổi ảnh
        </button>
      </div>

      <!-- FORM -->
      <div class="flex-1 grid grid-cols-2 gap-6">
        <div>
          <label class="text-sm text-gray-600">Email</label>
          <input
            class="w-full mt-1 border rounded-lg px-3 py-2 bg-gray-100"
            [(ngModel)]="email"
            disabled>
        </div>

        <div>
          <label class="text-sm text-gray-600">Họ và tên</label>
          <input
            class="w-full mt-1 border rounded-lg px-3 py-2"
            [(ngModel)]="hoTen"
            [disabled]="!editing">
        </div>

        <div>
          <label class="text-sm text-gray-600">Số điện thoại</label>
          <input
            class="w-full mt-1 border rounded-lg px-3 py-2"
            [(ngModel)]="soDienThoai"
            [disabled]="!editing">
        </div>

        <div>
          <label class="text-sm text-gray-600">Điểm tích lũy</label>
          <input
            class="w-full mt-1 border rounded-lg px-3 py-2 bg-gray-100"
            [(ngModel)]="diem"
            disabled>
        </div>
      </div>
    </div>

    <!-- SAVE BUTTON -->
    <div *ngIf="editing" class="mt-8">
      <button
        (click)="saveProfile()"
        [disabled]="!hasChanges()"
        class="bg-[#9A3F0F] text-white px-6 py-2 rounded-lg hover:bg-[#7C2D12] disabled:opacity-50 disabled:cursor-not-allowed">
        Lưu thay đổi
      </button>
    </div>

    <!-- ADDRESS BOOK -->
    <div class="mt-10">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-semibold">Sổ địa chỉ</h3>
        <button
          (click)="addAddress()"
          class="bg-[#9A3F0F] text-white px-4 py-2 rounded-lg text-sm hover:bg-[#7C2D12]">
          + Thêm địa chỉ
        </button>
      </div>

      <div *ngIf="isLoadingAddresses" class="text-center py-4">
        <p>Đang tải địa chỉ...</p>
      </div>

      <div *ngIf="!isLoadingAddresses && addresses.length === 0" class="text-center py-4 text-gray-500">
        <p>Bạn chưa có địa chỉ nào.</p>
      </div>

      <div class="space-y-4">
        <!-- ADDRESS ITEM -->
        <div *ngFor="let address of addresses"
             class="border border-[#E5D3B3] rounded-lg p-4 flex justify-between items-start"
             [class.bg-[#FAF7F2]]="address.macDinh">
          <div class="flex-1">
            <p class="font-medium">{{ address.tenNguoiNhan }}</p>
            <p class="text-sm text-gray-600">{{ address.soDienThoai }}</p>
            <p class="text-sm text-gray-600">{{ address.diaChiChiTiet }}</p>
            <span *ngIf="address.macDinh"
                  class="text-xs bg-[#9A3F0F] text-white px-2 py-1 rounded mt-2 inline-block">
              Mặc định
            </span>
          </div>
          <div class="flex gap-2">
            <button (click)="editAddress(address.id)"
                    class="text-sm text-[#9A3F0F] hover:underline">
              Sửa
            </button>
            <button *ngIf="!address.macDinh"
                    (click)="setDefaultAddress(address.id)"
                    class="text-sm text-blue-600 hover:underline">
              Đặt mặc định
            </button>
            <button *ngIf="!address.macDinh"
                    (click)="deleteAddress(address.id)"
                    class="text-sm text-red-600 hover:underline">
              Xóa
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
