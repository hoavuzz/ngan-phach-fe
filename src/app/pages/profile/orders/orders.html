<div class="flex-1 w-full">

<h2 class="text-2xl font-semibold mb-6">
Đơn hàng của tôi
</h2>

<!-- FILTER -->

<div class="bg-white border border-[#E5D3B3] rounded-xl p-4 mb-6 flex gap-4 text-sm">

<button
class="px-4 py-2 rounded-lg"
[ngClass]="activeFilter === 'all' ? 'bg-[#9A3F0F] text-white' : 'hover:bg-[#FAF7F2]'"
(click)="setFilter('all')">
Tất cả
</button>

<button
class="px-4 py-2 rounded-lg"
[ngClass]="activeFilter === 'pending' ? 'bg-[#9A3F0F] text-white' : 'hover:bg-[#FAF7F2]'"
(click)="setFilter('pending')">
Chờ xác nhận
</button>

<button
class="px-4 py-2 rounded-lg"
[ngClass]="activeFilter === 'shipping' ? 'bg-[#9A3F0F] text-white' : 'hover:bg-[#FAF7F2]'"
(click)="setFilter('shipping')">
Đang giao
</button>

<button
class="px-4 py-2 rounded-lg"
[ngClass]="activeFilter === 'done' ? 'bg-[#9A3F0F] text-white' : 'hover:bg-[#FAF7F2]'"
(click)="setFilter('done')">
Hoàn thành
</button>

<button
class="px-4 py-2 rounded-lg"
[ngClass]="activeFilter === 'cancel' ? 'bg-[#9A3F0F] text-white' : 'hover:bg-[#FAF7F2]'"
(click)="setFilter('cancel')">
Đã hủy
</button>

</div>
