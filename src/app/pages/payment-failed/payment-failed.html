<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8 text-center">
    <!-- Icon thất bại -->
    <div class="mb-6 flex justify-center">
      <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center">
        <svg class="w-12 h-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </div>
    </div>

    <h1 class="text-2xl font-bold text-gray-900 mb-3">Thanh toán thất bại!</h1>
    <p class="text-gray-600 mb-8">{{ errorMessage }}</p>

    <!-- Thông tin đơn hàng -->
    <div *ngIf="orderCode" class="bg-gray-50 rounded-xl p-4 mb-8">
      <div class="flex justify-between items-center py-2">
        <span class="text-gray-600">Mã đơn hàng:</span>
        <span class="font-semibold text-gray-900">{{ orderCode }}</span>
      </div>
    </div>

    <!-- Nút hành động -->
    <div class="space-y-3">
      <button
        (click)="tryAgain()"
        class="w-full bg-red-600 text-white py-3 rounded-xl font-medium hover:bg-red-700 transition-colors">
        Thử lại
      </button>
      <button
        (click)="viewCart()"
        class="w-full border-2 border-gray-300 text-gray-700 py-3 rounded-xl font-medium hover:bg-gray-50 transition-colors">
        Xem giỏ hàng
      </button>
      <button
        (click)="continueShopping()"
        class="w-full text-gray-500 py-3 rounded-xl font-medium hover:text-gray-700 transition-colors">
        Về trang chủ
      </button>
    </div>
  </div>
</div>
