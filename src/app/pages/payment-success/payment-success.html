<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8 text-center">
    <!-- Icon thành công -->
    <div class="mb-6 flex justify-center">
      <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center">
        <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
    </div>

    <h1 class="text-2xl font-bold text-gray-900 mb-3">Thanh toán thành công!</h1>
    <p class="text-gray-600 mb-8">Cảm ơn bạn đã đặt hàng. Đơn hàng của bạn đã được xác nhận.</p>

    <!-- Thông tin đơn hàng -->
    <div *ngIf="orderCode" class="bg-gray-50 rounded-xl p-4 mb-8">
      <div class="flex justify-between items-center py-2">
        <span class="text-gray-600">Mã đơn hàng:</span>
        <span class="font-semibold text-gray-900">{{ orderCode }}</span>
      </div>
      <div *ngIf="amount" class="flex justify-between items-center py-2 border-t border-gray-200">
        <span class="text-gray-600">Tổng tiền:</span>
        <span class="font-semibold text-red-600">{{ amount | currency:'VND':'symbol':'1.0-0' }}</span>
      </div>
    </div>

    <!-- Nút hành động -->
    <div class="space-y-3">
      <button
        (click)="viewOrder()"
        class="w-full bg-blue-600 text-white py-3 rounded-xl font-medium hover:bg-blue-700 transition-colors">
        Xem đơn hàng
      </button>
      <button
        (click)="continueShopping()"
        class="w-full border-2 border-gray-300 text-gray-700 py-3 rounded-xl font-medium hover:bg-gray-50 transition-colors">
        Tiếp tục mua sắm
      </button>
    </div>
  </div>
</div>
